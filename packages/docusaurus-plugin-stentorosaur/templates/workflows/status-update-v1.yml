# ⚠️ COMPATIBILITY: requires @stentorosaur/probe >= 0.1 on npm (the
# unified `stentorosaur` CLI, shipping alongside plugin 0.22). Do not
# install this workflow before that release.
#
# Issue-event handler (ADR-005 §3): incident changes propagate
# issue event → this workflow → data branch → CDN TTL → client fetch.
# The docs site never redeploys for status changes.

name: Status update (v1 data branch)

on:
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: write
  issues: read

concurrency:
  group: status-data-writer
  cancel-in-progress: false

jobs:
  update-incidents:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (config on main; the CLI switches to the data branch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update incidents on the data branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Only used when stentorosaur.config.js sets dataPlane
          # {kind: 'r2'} (ADR-006 Profile C) — empty otherwise.
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          # PINNED version (supply-chain: this workflow holds
          # contents:write). Bump deliberately when upgrading the plugin.
          npx -y -p @stentorosaur/probe@0.2.1 \
            stentorosaur update-incidents --config . --workdir . --branch status-data
