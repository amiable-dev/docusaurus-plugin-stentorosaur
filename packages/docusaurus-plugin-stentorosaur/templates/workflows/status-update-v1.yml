# Issue-event handler for the status/v1 data branch (ADR-005 §3; epic #63
# ticket #70). Incident changes propagate: issue event → this workflow →
# data branch → CDN TTL → client fetch. The docs site never redeploys.
#
# PROVISIONAL CONFIG: until `stentorosaur.config.ts` lands (ticket #74),
# the handler reads a minimal JSON config — see the update-incidents step.

name: Status update (v1 data branch)

on:
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: write
  issues: read

concurrency:
  group: status-data-writer
  cancel-in-progress: false

jobs:
  update-incidents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout data branch worktree
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update incidents on the data branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # The CLI wrapper lands with ticket #74 (unified `stentorosaur`
        # CLI). Until then this template documents the wiring; the
        # programmatic API is @stentorosaur/probe's fetchStatusIssues +
        # writeIssueInputs + regenerateDerived + pushWithRegenerateRetry.
        run: |
          npx -y -p @amiable-dev/docusaurus-plugin-stentorosaur \
            stentorosaur update-incidents \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --branch status-data
