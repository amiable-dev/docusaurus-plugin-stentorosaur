# ⚠️ COMPATIBILITY: requires @stentorosaur/probe >= 0.1 on npm (the
# unified `stentorosaur` CLI, shipping alongside plugin 0.22). Do not
# install this workflow before that release.
#
# Probe schedule (ADR-005 §3/§6): checks run in parallel, write per-entity
# files + JSONL archives to the DATA BRANCH, regenerate summary.json, and
# push with the §5 regenerate-and-retry rule. Monitoring never touches
# main and never redeploys the docs site.

name: Probe (status/v1 data branch)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: status-data-writer
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (config on main; the CLI switches to the data branch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run probes and push readings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # PINNED version (supply-chain: this workflow holds
          # contents:write). Bump deliberately when upgrading the plugin.
          npx -y -p @stentorosaur/probe@0.2.1 \
            stentorosaur probe --config . --workdir . --branch status-data
