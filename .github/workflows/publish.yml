name: Publish to npm

on:
  release:
    types: [published]
  # Bootstrap first-publish of the @stentorosaur/* packages (release
  # runbook §1b): publishes core+probe only, never the plugin.
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for provenance and trusted publishing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # npm@latest (12.x) requires Node >=22.22; workspace engines
          # need only >=20.19, so 22.x satisfies both.
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Update npm to latest version
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspaces --if-present

      - name: Build
        run: npm run build --workspaces --if-present

      - name: Publish @stentorosaur/core to npm
        # Core publishes FIRST: if this fails (e.g. npm org not configured),
        # nothing downstream ships with an unresolvable dependency.
        # Skip-if-published keeps release runs green after the §1b
        # bootstrap already shipped this version.
        working-directory: packages/core
        env:
          # TEMPORARY (runbook §1b/§1c): granular token for the first
          # publish; remove this env once trusted publishing is
          # configured for @stentorosaur/core.
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@stentorosaur/core@$VERSION" version >/dev/null 2>&1; then
            echo "@stentorosaur/core@$VERSION already on the registry — skipping"
          else
            npm publish --access public
          fi

      - name: Publish @stentorosaur/probe to npm
        working-directory: packages/probe
        env:
          # TEMPORARY (runbook §1b/§1c) — see the core step.
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@stentorosaur/probe@$VERSION" version >/dev/null 2>&1; then
            echo "@stentorosaur/probe@$VERSION already on the registry — skipping"
          else
            npm publish --access public
          fi

      - name: Publish plugin to npm
        # Releases only — a workflow_dispatch bootstrap must never ship
        # the plugin (1.0.0 becoming `latest` is the release's job).
        if: github.event_name == 'release'
        working-directory: packages/docusaurus-plugin-stentorosaur
        run: npm publish --access public
