name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Build first: the plugin's typecheck resolves @stentorosaur/core
        # through the workspace symlink to its compiled lib/
        run: npm run build --workspaces --if-present

      - name: Run type check
        run: npx tsc --noEmit -p packages/docusaurus-plugin-stentorosaur

      - name: Run tests
        run: npm test --workspaces --if-present -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.node-version == '20.x'
        with:
          files: ./packages/docusaurus-plugin-stentorosaur/coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

  lint-workflows:
    name: Lint workflows and templates
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: actionlint (repo workflows + shipped templates)
        run: |
          curl -sSfL https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz \
            | tar xzf - actionlint
          ./actionlint .github/workflows/*.yml \
            packages/docusaurus-plugin-stentorosaur/templates/workflows/*.yml

  e2e:
    name: Pipeline e2e (fixture site)
    runs-on: ubuntu-latest
    # Council follow-up (PR #81): bound a hung docusaurus build
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build --workspaces --if-present

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run pipeline e2e
        # monitor.js → mock endpoints → status-data → docusaurus build →
        # Playwright DOM assertions (ADR-005 Phase 0 regression harness)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
